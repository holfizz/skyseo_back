version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skyseo_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skyseo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-skyseo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - skyseo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skyseo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyseo_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skyseo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-skyseo}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_ID: ${TELEGRAM_ADMIN_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - skyseo_network
    volumes:
      - ./logs:/app/logs

  backup:
    image: postgres:15-alpine
    container_name: skyseo_backup
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skyseo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-skyseo}
      BACKUP_PASSWORD: ${BACKUP_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh
    networks:
      - skyseo_network
    entrypoint: /bin/sh
    command: -c "chmod +x /backup.sh && crond -f"

volumes:
  postgres_data:
    driver: local

networks:
  skyseo_network:
    driver: bridge
