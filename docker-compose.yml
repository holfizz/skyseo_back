version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skyseo_backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_ID: ${TELEGRAM_ADMIN_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      METRIKA_CLIENT_ID: ${METRIKA_CLIENT_ID}
      METRIKA_CLIENT_SECRET: ${METRIKA_CLIENT_SECRET}
      METRIKA_COUNTER_ID: ${METRIKA_COUNTER_ID}
      METRIKA_TOKEN: ${METRIKA_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
      IMAP_HOST: ${IMAP_HOST:-imap.beget.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - ./releases:/app/releases
    networks:
      - skyseo_network

networks:
  skyseo_network:
    driver: bridge
